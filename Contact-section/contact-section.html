<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Section</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-blue: #00d4ff;
      --secondary-blue: #0066ff;
      --accent: #00d4ff;
      --dark-blue: #001a33;
      --darker-blue: #000d1a;
      --nav-bg: rgba(0, 13, 26, 0.95);
      --glow-blue: rgba(0, 212, 255, 0.5);
    } */

      body {
        background: var(--darker-blue);
        font-family: "DM Sans", sans-serif;
        color: #e0f4ff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── SECTION ── */
      #contact {
        width: 100%;
        padding: 100px 24px;
        position: relative;
        overflow: hidden;
      }

      /* Ambient background glows */
      #contact::before {
        content: "";
        position: absolute;
        top: -120px;
        left: -120px;
        width: 480px;
        height: 480px;
        background: radial-gradient(
          circle,
          rgba(0, 102, 255, 0.18) 0%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
      }
      #contact::after {
        content: "";
        position: absolute;
        bottom: -100px;
        right: -100px;
        width: 420px;
        height: 420px;
        background: radial-gradient(
          circle,
          rgba(0, 212, 255, 0.13) 0%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
      }

      .contact-inner {
        max-width: 1100px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      /* ── HEADER ── */
      .contact-header {
        text-align: center;
        margin-bottom: 64px;
      }

      .contact-header .eyebrow {
        display: inline-block;
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--primary-blue);
        margin-bottom: 16px;
        position: relative;
      }
      .contact-header .eyebrow::before,
      .contact-header .eyebrow::after {
        content: "";
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 40px;
        height: 1px;
        background: var(--primary-blue);
        opacity: 0.5;
      }
      .contact-header .eyebrow::before {
        right: calc(100% + 12px);
      }
      .contact-header .eyebrow::after {
        left: calc(100% + 12px);
      }

      .contact-header h2 {
        font-family: "Syne", sans-serif;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        font-weight: 800;
        line-height: 1.1;
        background: linear-gradient(
          135deg,
          #ffffff 30%,
          var(--primary-blue) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
      }

      .contact-header p {
        font-size: 1.05rem;
        color: rgba(224, 244, 255, 0.6);
        max-width: 480px;
        margin: 0 auto;
        line-height: 1.7;
      }

      /* ── GRID ── */
      .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 28px;
        align-items: start;
      }

      /* ── LEFT CARD ── */
      .contact-info {
        background: linear-gradient(
          145deg,
          rgba(0, 26, 51, 0.9),
          rgba(0, 13, 26, 0.95)
        );
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 20px;
        padding: 40px 32px;
        backdrop-filter: blur(12px);
        position: relative;
        overflow: hidden;
      }
      .contact-info::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--primary-blue),
          transparent
        );
      }

      .contact-info h3 {
        font-family: "Syne", sans-serif;
        font-size: 1.45rem;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 8px;
      }
      .contact-info .info-sub {
        font-size: 0.88rem;
        color: rgba(224, 244, 255, 0.45);
        margin-bottom: 36px;
        line-height: 1.6;
      }

      .social-links {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .social-link {
        display: flex;
        align-items: center;
        gap: 16px;
        text-decoration: none;
        padding: 14px 18px;
        border-radius: 12px;
        border: 1px solid rgba(0, 212, 255, 0.1);
        background: rgba(0, 102, 255, 0.06);
        transition: all 0.3s ease;
        group: true;
      }
      .social-link:hover {
        border-color: rgba(0, 212, 255, 0.4);
        background: rgba(0, 102, 255, 0.14);
        transform: translateX(4px);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
      }

      .social-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          var(--secondary-blue),
          var(--primary-blue)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 0 14px rgba(0, 212, 255, 0.25);
      }
      .social-icon svg {
        width: 18px;
        height: 18px;
        fill: #ffffff;
      }

      .social-text {
        display: flex;
        flex-direction: column;
      }
      .social-label {
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--primary-blue);
        margin-bottom: 2px;
      }
      .social-value {
        font-size: 0.9rem;
        font-weight: 400;
        color: rgba(224, 244, 255, 0.85);
      }

      /* Decorative dots */
      .dot-grid {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
        opacity: 0.12;
      }
      .dot-grid span {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--primary-blue);
        display: block;
      }

      /* ── RIGHT CARD (FORM) ── */
      .contact-form-card {
        background: linear-gradient(
          145deg,
          rgba(0, 26, 51, 0.9),
          rgba(0, 13, 26, 0.95)
        );
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 20px;
        padding: 40px 36px;
        backdrop-filter: blur(12px);
        position: relative;
        overflow: hidden;
      }
      .contact-form-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--secondary-blue),
          var(--primary-blue),
          transparent
        );
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 16px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
        margin-bottom: 16px;
      }
      .field-group:last-of-type {
        margin-bottom: 0;
      }

      .form-row .field-group {
        margin-bottom: 0;
      }

      label {
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.8px;
        color: rgba(224, 244, 255, 0.55);
        text-transform: uppercase;
      }
      label span.req {
        color: var(--primary-blue);
        margin-left: 2px;
      }

      input,
      textarea {
        width: 100%;
        background: rgba(0, 13, 26, 0.7);
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 10px;
        padding: 13px 16px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.93rem;
        color: #e0f4ff;
        outline: none;
        transition:
          border-color 0.25s,
          box-shadow 0.25s,
          background 0.25s;
        resize: none;
      }
      input::placeholder,
      textarea::placeholder {
        color: rgba(224, 244, 255, 0.25);
      }
      input:focus,
      textarea:focus {
        border-color: rgba(0, 212, 255, 0.5);
        background: rgba(0, 26, 51, 0.6);
        box-shadow:
          0 0 0 3px rgba(0, 212, 255, 0.08),
          0 0 16px rgba(0, 212, 255, 0.08);
      }
      textarea {
        height: 140px;
        padding-top: 14px;
      }

      .btn-send {
        width: 100%;
        margin-top: 24px;
        padding: 15px 24px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(
          135deg,
          var(--secondary-blue) 0%,
          var(--primary-blue) 100%
        );
        color: #000d1a;
        font-family: "Syne", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(0, 212, 255, 0.3);
      }
      .btn-send::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          var(--primary-blue) 0%,
          var(--secondary-blue) 100%
        );
        opacity: 0;
        transition: opacity 0.3s;
      }
      .btn-send:hover::before {
        opacity: 1;
      }
      .btn-send:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0, 212, 255, 0.45);
      }
      .btn-send:active {
        transform: translateY(0);
      }
      .btn-send span {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      /* Status messages */
      .status-msg {
        display: none;
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.88rem;
        text-align: center;
        font-weight: 500;
      }
      .status-msg.success {
        display: block;
        background: rgba(0, 212, 255, 0.1);
        border: 1px solid rgba(0, 212, 255, 0.35);
        color: var(--primary-blue);
      }
      .status-msg.error {
        display: block;
        background: rgba(255, 60, 60, 0.1);
        border: 1px solid rgba(255, 60, 60, 0.35);
        color: #ff6b6b;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 820px) {
        .contact-grid {
          grid-template-columns: 1fr;
        }
        .contact-info {
          order: 2;
        }
        .contact-form-card {
          order: 1;
        }
      }

      @media (max-width: 500px) {
        #contact {
          padding: 72px 16px;
        }
        .contact-form-card,
        .contact-info {
          padding: 28px 20px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
      }

      /* ── ENTRANCE ANIMATION ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .contact-header {
        animation: fadeUp 0.7s ease both;
      }
      .contact-info {
        animation: fadeUp 0.7s 0.15s ease both;
      }
      .contact-form-card {
        animation: fadeUp 0.7s 0.25s ease both;
      }
    </style>
  </head>
  <body>
    <section id="contact">
      <div class="contact-inner">
        <!-- Header -->
        <div class="contact-header">
          <span class="eyebrow">Contact</span>
          <h2>Let's Work Together</h2>
          <p>
            Ready to bring your next project to life? Let's discuss your vision
            and build something great.
          </p>
        </div>

        <!-- Grid -->
        <div class="contact-grid">
          <!-- Left: Info -->
          <div class="contact-info">
            <h3>Get In Touch</h3>
            <p class="info-sub">
              Reach out through any of these channels and I'll get back to you
              as soon as possible.
            </p>

            <div class="social-links">
              <!-- Email -->
              <a href="mailto:msarim.business@gmail.com" class="social-link">
                <div class="social-icon">
                  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"
                    />
                  </svg>
                </div>
                <div class="social-text">
                  <span class="social-label">Email</span>
                  <span class="social-value">msarim.business@gmail.com</span>
                </div>
              </a>

              <!-- LinkedIn -->
              <a
                href="https://www.linkedin.com/in/sarim-awan/"
                target="_blank"
                rel="noopener noreferrer"
                class="social-link"
              >
                <div class="social-icon">
                  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                    />
                  </svg>
                </div>
                <div class="social-text">
                  <span class="social-label">LinkedIn</span>
                  <span class="social-value">Sarim Awan</span>
                </div>
              </a>

              <!-- GitHub -->
              <a
                href="https://github.com/iam-sarim"
                target="_blank"
                rel="noopener noreferrer"
                class="social-link"
              >
                <div class="social-icon">
                  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                    />
                  </svg>
                </div>
                <div class="social-text">
                  <span class="social-label">GitHub</span>
                  <span class="social-value">Sarim Awan</span>
                </div>
              </a>
            </div>

            <!-- Decorative dot grid -->
            <div class="dot-grid">
              <span></span><span></span><span></span><span></span> <span></span
              ><span></span><span></span><span></span> <span></span><span></span
              ><span></span><span></span> <span></span><span></span><span></span
              ><span></span>
            </div>
          </div>

          <!-- Right: Form -->
          <div class="contact-form-card">
            <div class="form-row">
              <div class="field-group">
                <label for="name">Name <span class="req">*</span></label>
                <input type="text" id="name" placeholder="Your name" required />
              </div>
              <div class="field-group">
                <label for="email">Email <span class="req">*</span></label>
                <input
                  type="email"
                  id="email"
                  placeholder="your@email.com"
                  required
                />
              </div>
            </div>

            <div class="field-group">
              <label for="subject">Subject <span class="req">*</span></label>
              <input
                type="text"
                id="subject"
                placeholder="Project discussion"
                required
              />
            </div>

            <div class="field-group">
              <label for="message">Message <span class="req">*</span></label>
              <textarea
                id="message"
                placeholder="Tell me about your project..."
                required
              ></textarea>
            </div>

            <button class="btn-send" id="sendBtn" onclick="sendEmail()">
              <span>
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
                Send Message
              </span>
            </button>

            <div class="status-msg" id="statusMsg"></div>
          </div>
        </div>
      </div>
    </section>

    <script>
      function sendEmail() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const subject = document.getElementById("subject").value.trim();
        const message = document.getElementById("message").value.trim();
        const status = document.getElementById("statusMsg");
        const btn = document.getElementById("sendBtn");

        status.className = "status-msg";
        status.textContent = "";

        if (!name || !email || !subject || !message) {
          status.className = "status-msg error";
          status.textContent = "⚠ Please fill in all fields before sending.";
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          status.className = "status-msg error";
          status.textContent = "⚠ Please enter a valid email address.";
          return;
        }

        // Build mailto link → opens user's default mail client pre-filled
        const to = "msarim.business@gmail.com";
        const subLine = encodeURIComponent(`[Portfolio] ${subject}`);
        const body = encodeURIComponent(
          `Hi Sarim,\n\nMy name is ${name} and I'd like to get in touch.\n\n${message}\n\n---\nReply to: ${email}`,
        );

        window.location.href = `mailto:${to}?subject=${subLine}&body=${body}`;

        status.className = "status-msg success";
        status.textContent =
          "✓ Your email client has been opened. Thank you for reaching out!";

        btn.textContent = "Message Prepared ✓";
        btn.style.opacity = "0.7";
        btn.style.cursor = "default";
      }
    </script>
  </body>
</html>
